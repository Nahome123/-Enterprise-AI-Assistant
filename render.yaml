services:
  - type: web
    name: lumora-api
    env: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /
    disk:
      name: lumora-uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lumora-postgres
          property: connectionString
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: FRONTEND_URL
        value: https://lumoradocs.org
      - key: BACKEND_CORS_ORIGINS
        value: https://lumoradocs.org
      - key: PUBLIC_BACKEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: TRANSCRIPTION_MODEL
        value: gpt-4o-mini-transcribe

databases:
  - name: lumora-postgres
    databaseName: lumora
    user: lumora
    plan: basic-256mb
